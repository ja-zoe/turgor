<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Turgor">
  <!-- Turgor mark: a water droplet part-filled with green (turgor pressure), a stem
       with two leaves growing through it. Light-background variant; the border is
       painted after the fill so the outline stays crisp at small sizes. -->
  <defs><clipPath id="tdrop"><path d="M24 3.5C36 15 36.5 32.5 24 44.5 11.5 32.5 12 15 24 3.5Z"/></clipPath></defs>
  <g clip-path="url(#tdrop)"><rect x="0" y="26" width="48" height="24" fill="#588157"/><ellipse cx="24" cy="26" rx="16" ry="3.4" fill="#6a9668"/></g>
  <path d="M24 3.5C36 15 36.5 32.5 24 44.5 11.5 32.5 12 15 24 3.5Z" fill="none" stroke="#2E4034" stroke-width="2.4"/>
  <line x1="24" y1="9" x2="24" y2="40" stroke="#2E4034" stroke-width="2" stroke-linecap="round"/>
  <path d="M24 22 L30 18" stroke="#2E4034" stroke-width="2" stroke-linecap="round"/>
  <path d="M24 28 L18 24" stroke="#F4F1EA" stroke-width="2" stroke-linecap="round"/>
</svg>
